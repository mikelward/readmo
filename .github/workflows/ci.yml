name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # Supabase Edge Functions run on Deno, not Node, so they're checked/tested
  # separately. Covers the SSRF IP-pinning integration test (real TCP/TLS),
  # which the Vitest+jsdom suite can't exercise.
  edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check SSRF module
        run: deno check supabase/functions/_shared/ssrf.ts

      - name: Test SSRF IP-pinning
        run: deno test --allow-net supabase/functions/_shared/ssrf.pin.test.ts
